<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Simple Home</title>
    <link rel="stylesheet" href="Google.css" />
  </head>
  <body>
    <header class="topbar">
      <nav class="nav">
        <a href="#" class="nav-link">Gmail</a>
        <a href="#" class="nav-link">Images</a>
        <button class="sign-in">Sign in</button>
      </nav>
    </header>

    <main class="container">
      <h1 class="logo" aria-label="Google">
        <span class="g">G</span><span class="o1">o</span
        ><span class="o2">o</span><span class="g2">g</span
        ><span class="l">l</span><span class="e">e</span>
      </h1>

      <form
        class="search"
        role="search"
        aria-label="Google search"
        action="#"
        method="get"
      >
        <div class="search-box">
          <input
            type="search"
            name="q"
            class="input"
            placeholder="Search Google or type a URL"
            autocomplete="off"
          />

          <svg class="icon right" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"
            />
          </svg>
        </div>

        <div class="btn-row">
          <button type="submit" class="btn">Google Search</button>
        </div>
      </form>

      <p class="lang">
        Google offered in:
        <a href="#">اردو</a> · <a href="#">پشتو</a>
      </p>
    </main>

    <footer class="footer">
      <div class="row country">Pakistan</div>
      <div class="row links">
        <div class="left">
          <a href="#">About</a>
          <a href="#">Advertising</a>
          <a href="#">Business</a>
          <a href="#">How Search works</a>
        </div>
        <div class="right">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Settings</a>
        </div>
      </div>
    </footer>
  </body>
</html>
